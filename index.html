<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>صيدلية بعثة الحج الكويتية - الحملات</title>
<style>
:root{--p:#0f4c81;--d:#082f52;--a:#19a7ce;--b:#f3f7fb;--c:#fff;--t:#172033;--m:#6b7280;--br:#e5e7eb}*{box-sizing:border-box}body{margin:0;font-family:Arial,Tahoma,sans-serif;background:linear-gradient(135deg,#eaf4ff,#f8fbff);color:var(--t);min-height:100vh}.page{max-width:1180px;margin:auto;padding:18px}.header{background:linear-gradient(135deg,var(--p),var(--d));color:#fff;border-radius:28px;padding:24px 18px;text-align:center;box-shadow:0 18px 42px rgba(15,76,129,.22);margin-bottom:14px}.header h1{margin:0;font-size:25px;line-height:1.7;font-weight:900}.header p{margin:8px 0 0;opacity:.92}.toolbar{position:sticky;top:0;z-index:50;background:rgba(243,247,251,.94);backdrop-filter:blur(14px);border:1px solid var(--br);border-radius:22px;box-shadow:0 12px 30px rgba(15,76,129,.12);padding:12px;margin-bottom:14px}.controls{display:grid;grid-template-columns:2fr 1fr auto;gap:10px}input,select,button{width:100%;min-height:50px;border:1px solid var(--br);border-radius:16px;padding:0 14px;font-size:16px;outline:none;background:#fff}input:focus,select:focus{border-color:var(--a);box-shadow:0 0 0 4px rgba(25,167,206,.12)}button{background:var(--p);color:#fff;border:none;font-weight:800;cursor:pointer;padding:0 18px}.stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;color:var(--m);font-size:13px}.badge{background:#fff;border:1px solid var(--br);padding:8px 12px;border-radius:999px}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}.card{background:#fff;border:1px solid var(--br);border-radius:24px;padding:16px;box-shadow:0 12px 28px rgba(15,76,129,.10);direction:ltr;text-align:left}.title{font-size:16.5px;font-weight:900;color:var(--d);margin-bottom:10px;line-height:1.4}.gen{font-size:14px;color:#374151;line-height:1.5;margin-bottom:12px}.meta{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#eef7ff;color:#0b355a;border:1px solid #d6ecff;padding:7px 10px;border-radius:999px;font-size:12.5px;font-weight:800}.qty{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.type{background:#ecfdf5;color:#065f46;border-color:#ccfbf1}.empty{display:none;text-align:center;color:var(--m);background:#fff;border:1px dashed var(--br);border-radius:22px;padding:30px;margin-top:10px}.foot{text-align:center;margin-top:35px;font-size:10.5px;opacity:.30;color:#111827}@media(max-width:800px){.page{padding:10px}.header{border-radius:22px;padding:20px 12px}.header h1{font-size:19px}.controls{grid-template-columns:1fr}.cards{grid-template-columns:1fr;gap:10px}.card{border-radius:20px;padding:14px}}
</style></head><body><main class="page"><header class="header"><div style="font-size:52px;margin-bottom:10px">🇰🇼</div><h1>صيدلية بعثة الحج الكويتية<br><span style="font-size:.9em">قائمة الحملات - سنة 2026م</span></h1><p>قائمة الأدوية والمستلزمات للحملات</p></header>
<section class="toolbar"><div class="controls"><input id="q" type="search" placeholder="Search trade name, generic name, quantity, or type..."><select id="type"><option value="">All Types</option></select><button onclick="clearFilters()">Clear</button></div><div class="stats"><span class="badge">Total: <strong id="total">0</strong></span><span class="badge">Showing: <strong id="shown">0</strong></span></div></section><section id="cards" class="cards"></section><div id="empty" class="empty">No matching results found</div><div class="foot">Prepared by Ph. Talal Alenezi</div></main>
<script>
const records=[[1, "ACETAB 25MG (K.S.P)", "Captopril", 30, "Tablets"], [2, "CETRALON 10MG", "Cetirizine", 100, "Tablets"], [3, "CLAVOMOX 1G (KSP)", "Amoxicillin/Clavulanic Acid", 70, "Tablets"], [4, "DAFLON 500MG (SERVIER)", "Diosmin + Hesperidin", 30, "Tablets"], [5, "EZIPECT 8MG (KSP)", "Diphenhydramine", 100, "Tablets"], [6, "FENAMIC 250MG (KSP)", "Mefenamic Acid", 60, "Tablets"], [7, "FLUDREX (KSP)", "Paracetamol + Pseudoephedrine", 200, "Tablets"], [8, "FUSIX 40MG (K.S.P)", "Furosemide", 30, "Tablets"], [9, "GASTRO-EASE 42MG (US PHARMA)", "Attapulgite", 100, "Tablets"], [10, "GLYCERYL TRINITRATE 0.5MG (TAJ PH)", "Glyceryl trinitrate", 80, "Tablets"], [11, "GUPISONE 5MG (JULPHAR)", "Prednisolone", 40, "Tablets"], [12, "KLACID 500MG (ABBOTT)", "Clarithromycin", 100, "Tablets"], [13, "LORADAY 10MG (KSP)", "Loratadine", 100, "Tablets"], [14, "MINISEC 20MG (KSP)", "Omeprazole", 56, "Tablets"], [15, "OLFEN 50MG (ACINO)", "Diclofenac Sodium", 100, "Tablets"], [16, "OMACID (NPI)", "Antacid", 100, "Tablets"], [17, "PANADREX 500MG (KSP)", "Paracetamol", 300, "Tablets"], [18, "PREMOSAN 10MG (JULPHAR) 20 TAB", "Metoclopramide", 40, "Tablets"], [19, "PRIMOLUT-NOR 10MG (BAYER) ", "Norethisterone", 30, "Tablets"], [20, "SCOPINAL 10MG (JULPHAR)", "Hyoscine", 60, "Tablets"], [21, "SUPRAZOLE 200MG (KSP) 1000 TAB", "Metronidazole", 150, "Tablets"], [22, "ANTIRHEUMATIC OINT (V) (Olfen Gel)", "Diclofenac Sodium", 2, "Preparations"], [23, "ATROVENT SOLUTION 250MCG/2ML 54PKT", "Ipratropium Bromide Solution", 1, "Preparations"], [24, "BETA-SITOSTEROL OINT.(AVOMEB)30GM 12 TUB", "Beta-Sitosterol", 1, "Preparations"], [25, "FUCIDIC ACID 2% OINTI5GM(FUCIDIN)200TUB", "Fusidic Acid", 2, "Preparations"], [26, "HYDROCORTISONE. 1% CREAM 30 TUB", "Hydrocortisone", 2, "Preparations"], [27, "NYSTATIN CREAM 15GM", "Nystatin", 3, "Preparations"], [28, "ORAL REHYDRATION SALT 28.5GM 10SCH", "Oral Rehydration Salt", 10, "Preparations"], [29, "PULMICORT 0.50MG/ML 20 AMP", "Budesonide", 5, "Preparations"], [30, "SALBUTAMOL RESP-SOLN 120 BOT", "Salbutamol", 1, "Preparations"], [31, "TRIAMCINOLONE 0.1%+NYST.+NEO.CREAM 10TU (Panderm)", "Triamcinolone, Nystatin, Neomycin", 4, "Preparations"], [32, "A-I.V CANULA CATHETER 22G100PCS", "-", 10, "Medical Device"], [33, "ADHESIVE PLASTER NON-ALLERGIC 2” 360 ROL", "-", 2, "Medical Device"], [34, "ADHESIVE PLASTER NON-ALLERGIC 3” 6 ROL", "-", 1, "Medical Device"], [35, "ALCOHOL INJECT SWAB 1”X1”, 8000 PCS", "-", 50, "Medical Device"], [36, "BANDAGE OPEN WOVE GAUZE 6YDX2”720RL", "-", 12, "Medical Device"], [37, "COTTON BALLS SMALL SIZE, 20000 (40BAGS)", "-", 1, "Medical Device"], [38, "CREP BANDAGE 6”X5YD 12ROL", "-", 4, "Medical Device"], [39, "CREP BANDAGE 2”X5YD 12 ROL", "-", 5, "Medical Device"], [40, "DIS-NEEDLE 22GX1 1/4” 100 PCS", "-", 20, "Medical Device"], [41, "DIS-SYRINGE 2-3ML 100PC", "-", 20, "Medical Device"], [42, "GAUZE SWAB 10X10CM 8PLY 40 PKT", "-", 1, "Medical Device"], [43, "INFUSION SET SAFETY 30PCS", "-", 10, "Medical Device"], [44, "SURGICAL MASK WITH EAR LOOP 2400PCS", "-", 100, "Medical Device"], [45, "TONGUE BLADES 100PC", "-", 50, "Medical Device"], [46, "ADRENALINE 1/1000 1ML (SC,IM,IV) 10 AMP", "Epinephrine", 2, "Injection"], [47, "DEXTROSE 5% 500ML 20 BOT", "Dextrose", 3, "Injection"], [48, "DICLOFENAC SOD 75MG/3ML(PANPHARMA)", "Diclofenac Sodium", 10, "Injection"], [49, "DISTILLED WATER 5-10ML 50 AMP", "Water for Injection", 10, "Injection"], [50, "HYDROCORTISONE 100MG I.M&I.V 10 VIL", "Hydrocortisone", 5, "Injection"], [51, "METOCLOPRAMIDE 10MG/2ML (KSP)", "Metoclopramide", 5, "Injection"], [52, "PARACETAMOL HCL 1GM (KS)", "Paracetamol", 2, "Injection"], [53, "SCOPINAL 20MG/ML", "Hyoscine Butylbromide", 5, "Injection"], [54, "SODIUM CHLORIDE 0.9% 500ML 25 BOT", "Sodium Chloride (0.9% Saline)", 2, "Injection"], [55, "VITAMIN B1+B6+B12 BIOVIT", "Thiamine (Vitamin B1), Pyridoxine (Vitamin B6), Cyanocobalamin (Vitamin B12)", 6, "Injection"]].map(r=>({sn:r[0],trade:r[1],generic:r[2],quantity:r[3],type:r[4]}));
const q=document.getElementById('q'), type=document.getElementById('type'), cards=document.getElementById('cards'), empty=document.getElementById('empty'), total=document.getElementById('total'), shown=document.getElementById('shown');
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function init(){[...new Set(records.map(x=>x.type))].sort().forEach(t=>{let o=document.createElement('option');o.value=t;o.textContent=t;type.appendChild(o)});render()}
function render(){let v=q.value.trim().toLowerCase(), ty=type.value;let f=records.filter(x=>(`${x.sn} ${x.trade} ${x.generic} ${x.quantity} ${x.type}`.toLowerCase().includes(v))&&(!ty||x.type===ty));cards.innerHTML=f.map(x=>`<article class="card"><div class="title">${x.sn}. ${esc(x.trade)}</div><div class="gen">${esc(x.generic)}</div><div class="meta"><span class="pill qty">Quantity: ${esc(x.quantity)}</span><span class="pill type">${esc(x.type)}</span></div></article>`).join('');total.textContent=records.length;shown.textContent=f.length;empty.style.display=f.length?'none':'block'}
function clearFilters(){q.value='';type.value='';render()}
q.addEventListener('input',render);type.addEventListener('change',render);init();
</script></body></html>
